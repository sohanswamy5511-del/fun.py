<!DOCTYPE html>
<html>
<head>
    <title>Slot Machine Game</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: monospace;
            background: #000;
            color: #0f0;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }
        #canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        .hud {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #0f0;
            padding: 15px;
            font-size: 14px;
            color: #0f0;
            z-index: 200;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
        }
        .hud-line {
            margin: 5px 0;
        }
        #ui-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.8);
            z-index: 300;
        }
        .ui-panel {
            background: rgba(0, 0, 0, 0.95);
            border: 3px solid #ffaa00;
            padding: 30px;
            text-align: center;
            max-width: 500px;
            color: #ffaa00;
        }
        .ui-panel h2 {
            font-size: 24px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #ffaa00;
        }
        .charm-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 20px 0;
        }
        .charm-item, .deadline-btn {
            padding: 15px;
            background: linear-gradient(135deg, #2a1a0a, #1a0a00);
            border: 2px solid #ffaa00;
            color: #ffaa00;
            cursor: pointer;
            font-family: monospace;
            transition: all 0.3s;
        }
        .charm-item:hover, .deadline-btn:hover {
            background: linear-gradient(135deg, #3a2a1a, #2a1a0a);
            box-shadow: 0 0 20px #ffaa00;
            transform: scale(1.05);
        }
        .deadline-panel {
            border: 3px solid #ff4444;
            color: #ff4444;
        }
        .deadline-panel h2,
        .deadline-panel .amount {
            color: #ff4444;
            text-shadow: 0 0 10px #ff0000;
        }
        .deadline-btn {
            border-color: #ff4444;
            color: #ff4444;
        }
        .deadline-btn:hover {
            border-color: #ff4444;
            box-shadow: 0 0 20px #ff0000;
        }
        .instructions {
            font-size: 12px;
            margin-top: 15px;
            color: #aaaaaa;
        }
        .spin-counter {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #00ff00;
            padding: 15px;
            font-size: 16px;
            color: #00ffff;
            z-index: 200;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
            text-align: center;
        }
    </style>
</head>
<body>
<canvas id="canvas"></canvas>

<div class="hud">
    <div class="hud-line">BALANCE: <span id="hud-money">$12</span></div>
    <div class="hud-line">---</div>
    <div class="hud-line" style="font-size: 11px;">MOUSE: Look<br>WASD: Move<br>1-8: SPIN<br>S: STORE<br>C: CHARM<br>Q: QUIT</div>
</div>

<div class="spin-counter">
    <div>SPIN <span id="spin-num">1</span>/<span id="spin-max">8</span></div>
</div>

<div id="ui-overlay">
    <div id="store-panel" class="ui-panel" style="display: none;">
        <h2>🧙 CHARM MERCHANT</h2>
        <div style="font-size: 14px; margin-bottom: 20px;">Select a charm ($5)</div>
        <div class="charm-grid" id="charm-grid"></div>
        <div class="instructions">Press 0 or ESC to leave</div>
    </div>
    
    <div id="deadline-panel" class="ui-panel deadline-panel" style="display: none;">
        <h2>💀 PAYMENT DUE</h2>
        <div id="deadline-info"></div>
        <div class="amount" id="deadline-amount">$100</div>
        <div style="margin-top: 20px;">
            <button class="deadline-btn" onclick="deadlineChoice('1')" style="width: 48%; margin-right: 2%;">1. Pay</button>
            <button class="deadline-btn" onclick="deadlineChoice('2')" style="width: 48%;">2. Skip</button>
        </div>
        <div id="deadline-mandatory" style="display: none; margin-top: 15px; color: #ff0000;">MANDATORY - Cannot Skip</div>
    </div>
</div>

<script>
// Three.js scene setup
const canvas = document.getElementById('canvas');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x001100);
scene.fog = new THREE.Fog(0x001100, 50, 100);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 1.6, 0);

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;

// Lights - Multiple sources for better illumination
const ambientLight = new THREE.AmbientLight(0x00ff00, 0.5);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0x00ff00, 0.6);
directionalLight.position.set(10, 30, 10);
directionalLight.castShadow = true;
scene.add(directionalLight);

// Point lights for better ambient coverage
const pointLight1 = new THREE.PointLight(0x00ff00, 1.5, 30);
pointLight1.position.set(0, 15, 0);
scene.add(pointLight1);

const pointLight2 = new THREE.PointLight(0x00ff00, 1.2, 25);
pointLight2.position.set(0, 35, 0);
scene.add(pointLight2);

// Spotlight from above
const spotlight = new THREE.SpotLight(0x00ff00, 1.8, 50, Math.PI / 4, 0.8, 1);
spotlight.position.set(0, 45, 0);
spotlight.target.position.set(0, 0, 0);
scene.add(spotlight);
scene.add(spotlight.target);

// ROOM: 12 wide x 12 deep x 50 tall
// Walls are at boundaries: x: -6 to 6, z: -6 to 6, y: 0 to 50

const createWall = (width, height, depth, x, y, z, color) => {
    const geometry = new THREE.BoxGeometry(width, height, depth);
    const material = new THREE.MeshStandardMaterial({ 
        color: color,
        emissive: color,
        emissiveIntensity: 0.2
    });
    const wall = new THREE.Mesh(geometry, material);
    wall.position.set(x, y, z);
    wall.castShadow = true;
    wall.receiveShadow = true;
    scene.add(wall);
    return wall;
};

// Floor
createWall(12, 0.1, 12, 0, -0.05, 0, 0x001100);

// Left wall (DEADLINE area) - Red
createWall(0.1, 50, 12, -6, 25, 0, 0x440000);

// Right wall - Green
createWall(0.1, 50, 12, 6, 25, 0, 0x004400);

// Back wall (STORE area) - Yellow/Gold
createWall(12, 50, 0.1, 0, 25, -6, 0x1a1a00);

// Front wall (open) - no wall
// Ceiling
createWall(12, 0.1, 12, 0, 50.05, 0, 0x000044);

// SLOT MACHINE (center front at z=5, near front)
const machineBody = createWall(3, 4, 0.5, 0, 1.8, 4.5, 0x0a0a2a);

// Board cells (5x3 grid)
const boardCells = [];
const cellSize = 0.4;
const boardStartX = -0.8;
const boardStartY = 2.5;
const boardStartZ = 5;

for (let row = 0; row < 3; row++) {
    for (let col = 0; col < 5; col++) {
        const x = boardStartX + col * (cellSize + 0.1);
        const y = boardStartY - row * (cellSize + 0.1);
        const z = boardStartZ;
        
        const cellGeom = new THREE.BoxGeometry(cellSize, cellSize, 0.05);
        const cellMat = new THREE.MeshStandardMaterial({
            color: 0x001a20,
            emissive: 0x00ff00,
            emissiveIntensity: 0.3
        });
        const cell = new THREE.Mesh(cellGeom, cellMat);
        cell.position.set(x, y, z);
        cell.castShadow = true;
        cell.receiveShadow = true;
        scene.add(cell);
        
        boardCells.push({
            mesh: cell,
            index: row * 5 + col,
            row: row,
            col: col,
            symbolText: '?',
            multText: ''
        });
    }
}

// Mouse movement
let mouseX = 0;
let mouseY = 0;

document.addEventListener('mousemove', (e) => {
    mouseX = e.clientX / window.innerWidth;
    mouseY = e.clientY / window.innerHeight;
});

// Movement system
const keys = {
    w: false,
    a: false,
    s: false,
    d: false
};

const moveSpeed = 0.08;
const maxX = 5.5;
const maxZ = 24;

document.addEventListener('keydown', (e) => {
    const key = e.key.toLowerCase();
    if (key === 'w') { keys.w = true; e.preventDefault(); }
    if (key === 'a') { keys.a = true; e.preventDefault(); }
    if (key === 's') { 
        if (uiMode === 'normal') { sendCommand('store'); }
        e.preventDefault();
    }
    if (key === 'd') { keys.d = true; e.preventDefault(); }
});

document.addEventListener('keyup', (e) => {
    const key = e.key.toLowerCase();
    if (key === 'w') keys.w = false;
    if (key === 'a') keys.a = false;
    if (key === 'd') keys.d = false;
    if (key === 'escape' && uiMode === 'store') {
        sendCommand('');
        uiMode = 'normal';
        hideUI();
    }
});

document.addEventListener('keypress', (e) => {
    const key = e.key.toLowerCase();
    
    if (uiMode === 'store') {
        if (key === '0') {
            sendCommand('');
            uiMode = 'normal';
            hideUI();
        } else if (['1', '2', '3', '4'].includes(key)) {
            chooseCharm(key);
        }
    } else if (uiMode === 'deadline') {
        if (['1', '2'].includes(key)) {
            deadlineChoice(key);
        }
    } else if (uiMode === 'normal') {
        if (key === 'c') {
            e.preventDefault();
            sendCommand('charm');
        } else if (key === 'q') {
            e.preventDefault();
            sendCommand('q');
        } else if (['1', '2', '3', '4', '5', '6', '7', '8'].includes(key)) {
            sendCommand(key);
        }
    }
});

let uiMode = 'normal';
let currentSpinNum = 1;
let currentMaxSpins = 8;

// Start game
fetch('/api/start-game', { method: 'POST' });

// Main polling loop
setInterval(async () => {
    const res = await fetch('/api/get-output');
    const data = await res.json();
    if (!data || !data.output) return;

    const text = data.output;

    // Extract spin counter
    const spinMatch = text.match(/--- SPIN (\d+) ---/);
    if (spinMatch) {
        currentSpinNum = parseInt(spinMatch[1]);
        document.getElementById('spin-num').textContent = currentSpinNum;
    }

    // Extract money
    const moneyMatch = text.match(/You have \$(\d+)/);
    if (moneyMatch) {
        document.getElementById('hud-money').textContent = '$' + moneyMatch[1];
    }

    // Extract max spins
    const maxMatch = text.match(/max (\d+)\)/);
    if (maxMatch) {
        currentMaxSpins = parseInt(maxMatch[1]);
        document.getElementById('spin-max').textContent = currentMaxSpins;
    }

    // BOARD parsing
    const boardMatch = text.match(/=== BOARD ===([\s\S]*?)(?:PATTERN_CELLS|===|$)/);
    if (boardMatch) {
        const raw = boardMatch[1].trim();
        const lines = raw.split('\n').filter(l => l.includes('|'));
        const cells = [];

        for (const line of lines) {
            const parts = line.split('|').map(p => p.trim()).filter(p => p && p !== '==========');
            for (const part of parts) {
                cells.push(part);
            }
        }

        if (cells.length === 15) {
            const symbolEmojis = {
                'Coin': '🪙',
                'Spinner': '🎡',
                'Dice': '🎲',
                'Card': '🃏',
                'Wheel': '🎯'
            };

            for (let i = 0; i < boardCells.length; i++) {
                const cellData = boardCells[i];
                const displayName = cells[i];
                let symbol = '?';
                let mult = '';

                for (const [symName, emoji] of Object.entries(symbolEmojis)) {
                    if (displayName.includes(symName)) {
                        symbol = emoji;
                        const multMatch = displayName.match(/\(([^)]+)\)/);
                        if (multMatch) {
                            const val = multMatch[1];
                            const numMatch = val.match(/\d+/);
                            if (numMatch) {
                                mult = numMatch[0];
                            }
                        }
                        break;
                    }
                }

                cellData.symbolText = symbol;
                cellData.multText = mult;

                const textCanvas = document.createElement('canvas');
                textCanvas.width = 128;
                textCanvas.height = 128;
                const ctx = textCanvas.getContext('2d');
                ctx.fillStyle = '#001a20';
                ctx.fillRect(0, 0, 128, 128);
                ctx.strokeStyle = '#00ff00';
                ctx.lineWidth = 2;
                ctx.strokeRect(0, 0, 128, 128);
                
                ctx.fillStyle = '#00ff00';
                ctx.font = 'bold 50px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(symbol, 64, 45);
                
                if (mult) {
                    ctx.fillStyle = '#ffff00';
                    ctx.font = 'bold 24px Arial';
                    ctx.fillText('x' + mult, 64, 85);
                }

                const texture = new THREE.CanvasTexture(textCanvas);
                const textMat = new THREE.MeshStandardMaterial({ 
                    map: texture,
                    emissive: 0x00ff00,
                    emissiveIntensity: 0.2
                });
                cellData.mesh.material = textMat;
            }
        }
    }

    // Pattern highlighting
    const patternMatch = text.match(/PATTERN_CELLS:(.+?)(?:\n|$)/);
    if (patternMatch) {
        const patternStr = patternMatch[1];
        const cellCoords = [];
        const coordMatches = patternStr.matchAll(/\((\d+),(\d+)\)/g);
        
        for (const match of coordMatches) {
            const row = parseInt(match[1]);
            const col = parseInt(match[2]);
            cellCoords.push(row * 5 + col);
        }

        for (const cell of boardCells) {
            const normalMat = new THREE.MeshStandardMaterial({
                color: 0x001a20,
                emissive: 0x00ff00,
                emissiveIntensity: 0.3
            });
            cell.mesh.material = normalMat;
        }

        for (const idx of cellCoords) {
            const cellData = boardCells[idx];
            const textCanvas = document.createElement('canvas');
            textCanvas.width = 128;
            textCanvas.height = 128;
            const ctx = textCanvas.getContext('2d');
            ctx.fillStyle = '#1a0a2a';
            ctx.fillRect(0, 0, 128, 128);
            ctx.strokeStyle = '#ff00ff';
            ctx.lineWidth = 4;
            ctx.strokeRect(0, 0, 128, 128);
            
            ctx.fillStyle = '#00ff00';
            ctx.font = 'bold 50px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(cellData.symbolText, 64, 45);
            
            if (cellData.multText) {
                ctx.fillStyle = '#ffff00';
                ctx.font = 'bold 24px Arial';
                ctx.fillText('x' + cellData.multText, 64, 85);
            }

            const texture = new THREE.CanvasTexture(textCanvas);
            const highlightMat = new THREE.MeshStandardMaterial({
                map: texture,
                emissive: 0xff00ff,
                emissiveIntensity: 0.6
            });
            cellData.mesh.material = highlightMat;
        }
    }

    // Store detection
    if (text.includes("Welcome to the store") && uiMode === 'normal') {
        uiMode = 'store';
        showStore(text);
    } else if (text.includes("Welcome to the store") === false && uiMode === 'store') {
        uiMode = 'normal';
        hideUI();
    }

    // Deadline detection - only after first spin
    if (currentSpinNum > 1) {
        const deadlineTriggers = ["DEADLINE", "Pay deadline", "Skip this round"];
        const isDeadline = deadlineTriggers.some(t => text.includes(t));
        
        if (isDeadline && uiMode === 'normal') {
            uiMode = 'deadline';
            showDeadline(text);
        } else if (!isDeadline && uiMode === 'deadline') {
            uiMode = 'normal';
            hideUI();
        }
    }
}, 200);

function showStore(text) {
    hideUI();
    const panel = document.getElementById('store-panel');
    const grid = document.getElementById('charm-grid');
    
    const charmPattern = /(\d+):\s*(.+)/g;
    let match;
    const charms = [];
    
    while ((match = charmPattern.exec(text)) !== null) {
        charms.push({ num: match[1], name: match[2].trim() });
    }
    
    grid.innerHTML = charms.map(c => `
        <div class="charm-item" onclick="chooseCharm('${c.num}')">
            <div>${c.num}</div>
            <div style="font-size: 12px;">${c.name}</div>
            <div style="font-size: 11px; color: #aaaa00;">$5</div>
        </div>
    `).join('');
    
    panel.style.display = 'block';
    document.getElementById('ui-overlay').style.display = 'flex';
}

function showDeadline(text) {
    hideUI();
    const panel = document.getElementById('deadline-panel');
    const amount = document.getElementById('deadline-amount');
    const mandatory = document.getElementById('deadline-mandatory');
    
    const totalMatch = text.match(/Total Payment Due:\s*\$([0-9,]+)/);
    const deadlineMatch = text.match(/DEADLINE (\d+), ROUND (\d+)\/3/);
    
    if (totalMatch) {
        amount.textContent = '$' + totalMatch[1];
    }
    
    const isMandatory = deadlineMatch && deadlineMatch[2] === '3';
    if (isMandatory) {
        mandatory.style.display = 'block';
        const btn = document.querySelector('[onclick="deadlineChoice(\'2\')"]');
        if (btn) btn.style.display = 'none';
    } else {
        mandatory.style.display = 'none';
        const btn = document.querySelector('[onclick="deadlineChoice(\'2\')"]');
        if (btn) btn.style.display = 'inline-block';
    }
    
    panel.style.display = 'block';
    document.getElementById('ui-overlay').style.display = 'flex';
}

function hideUI() {
    document.getElementById('ui-overlay').style.display = 'none';
    document.getElementById('store-panel').style.display = 'none';
    document.getElementById('deadline-panel').style.display = 'none';
}

function chooseCharm(num) {
    sendCommand(num);
    uiMode = 'normal';
    hideUI();
}

function deadlineChoice(num) {
    sendCommand(num);
    uiMode = 'normal';
    hideUI();
}

function sendCommand(cmd) {
    fetch('/api/send-input', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ input: cmd })
    });
}

// Animation loop
function animate() {
    requestAnimationFrame(animate);
    
    // Update camera rotation based on mouse
    const targetRotX = (mouseY - 0.5) * 0.5;
    const targetRotY = (mouseX - 0.5) * 1.5;
    
    camera.rotation.order = 'YXZ';
    camera.rotation.y += (targetRotY - camera.rotation.y) * 0.1;
    camera.rotation.x += (targetRotX - camera.rotation.x) * 0.1;
    
    // Update camera position based on WASD
    const forward = new THREE.Vector3(0, 0, -1).applyAxisAngle(new THREE.Vector3(0, 1, 0), camera.rotation.y);
    const right = new THREE.Vector3(1, 0, 0).applyAxisAngle(new THREE.Vector3(0, 1, 0), camera.rotation.y);
    
    if (keys.w) {
        camera.position.x += forward.x * moveSpeed;
        camera.position.z += forward.z * moveSpeed;
    }
    if (keys.a) {
        camera.position.x -= right.x * moveSpeed;
        camera.position.z -= right.z * moveSpeed;
    }
    if (keys.d) {
        camera.position.x += right.x * moveSpeed;
        camera.position.z += right.z * moveSpeed;
    }
    
    // Confine to box: x: -5.5 to 5.5, z: -5.5 to 5.5
    camera.position.x = Math.max(-5.5, Math.min(5.5, camera.position.x));
    camera.position.z = Math.max(-5.5, Math.min(5.5, camera.position.z));
    camera.position.y = Math.max(0.5, Math.min(48, camera.position.y)); // between floor and ceiling
    
    renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
