<!DOCTYPE html>
<html>
<head>
    <title>Slot Machine Game</title>
    <style>
        body {
            font-family: monospace;
            background-color: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
        }

        #terminal {
            background-color: #000;
            border: 2px solid #0f0;
            padding: 15px;
            height: 600px;
            overflow-y: auto;
            margin-bottom: 20px;
            white-space: pre;
            font-family: monospace;
        }

        #board {
            display: grid;
            grid-template-columns: repeat(5, 60px);
            gap: 6px;
            margin-bottom: 20px;
        }

        .cell {
            width: 60px;
            height: 60px;
            background: #333;
            border: 1px solid #666;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 22px;
            color: #fff;
        }

        .button-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .button-row button {
            padding: 12px 25px;
            background-color: #0f0;
            color: #000;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-family: monospace;
            font-size: 16px;
            border-radius: 4px;
        }

        .button-row button:hover {
            background-color: #0a0;
        }
    </style>
</head>
<body>

<h1>🎰 Slot Machine Game</h1>

<div id="board"></div>
<div id="terminal"></div>

<div id="normal-buttons" class="button-row">
    <button onclick="spinMax()">Spin Max</button>
    <button onclick="spinHalf()">Spin ½ Max</button>
    <button onclick="openStore()">Store</button>
    <button onclick="openCharm()">Charm</button>
    <button onclick="sendCommand('q')">Quit</button>
</div>

<div id="store-buttons" class="button-row" style="display:none;">
    <button onclick="storeChoice('1')">1</button>
    <button onclick="storeChoice('2')">2</button>
    <button onclick="storeChoice('3')">3</button>
    <button onclick="storeChoice('4')">4</button>
    <button onclick="storeChoice('leave')">Leave</button>
</div>

<div id="deadline-buttons" class="button-row" style="display:none;">
    <button onclick="deadlineChoice('1')">1</button>
    <button onclick="deadlineChoice('2')">2</button>
</div>

<script>
const terminal = document.getElementById('terminal');
const board = document.getElementById('board');
let uiMode = "normal";

fetch('/api/start-game', { method: 'POST' });

setInterval(async () => {
    const res = await fetch('/api/get-output');
    const data = await res.json();

    if (!data || !data.output) return;

    const text = data.output;

    // BOARD DETECTION
    const boardMatch = text.match(/=== BOARD ===([\s\S]*?)(?:\n\n|\r\n\r\n|$)/);

    if (boardMatch) {
        const raw = boardMatch[1];
        const nums = raw.match(/\d+/g);

        if (nums && nums.length === 15) {
            board.innerHTML = nums.map(n => `<div class="cell">${n}</div>`).join("");
        }

        const cleaned = text.replace(boardMatch[0], "");
        terminal.innerHTML += cleaned;
    } else {
        terminal.innerHTML += text;
    }

    // ⭐ DEADLINE DETECTION ⭐
    const chunk = text;

    const deadlineTriggers = [
        "1. Pay deadline",
        "2. Skip this round",
        "You don't have enough money to pay",
        "Would you like to skip this round"
    ];

    const isDeadline = deadlineTriggers.some(t => chunk.includes(t));

    if (isDeadline) {
        showDeadlineButtons();
    } else if (uiMode === "deadline") {
        showNormalButtons();
    }

    terminal.scrollTop = terminal.scrollHeight;

}, 200);

function sendCommand(cmd) {
    fetch('/api/send-input', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ input: cmd })
    });
}

function extractMoney() {
    const text = terminal.innerText;
    const matches = [...text.matchAll(/You have \$(\d+)/g)];
    if (matches.length === 0) return 0;
    return parseInt(matches[matches.length - 1][1], 10);
}

function spinMax() {
    const money = extractMoney();
    const maxSpins = Math.min(money, 8);
    if (maxSpins > 0) sendCommand(String(maxSpins));
}

function spinHalf() {
    const money = extractMoney();
    const maxSpins = Math.min(money, 8);
    const half = Math.floor(maxSpins / 2);
    if (half > 0) sendCommand(String(half));
}

function showNormalButtons() {
    document.getElementById("normal-buttons").style.display = "flex";
    document.getElementById("store-buttons").style.display = "none";
    document.getElementById("deadline-buttons").style.display = "none";
    uiMode = "normal";
}

function showStoreButtons() {
    document.getElementById("normal-buttons").style.display = "none";
    document.getElementById("store-buttons").style.display = "flex";
    document.getElementById("deadline-buttons").style.display = "none";
    uiMode = "store";
}

function showDeadlineButtons() {
    document.getElementById("normal-buttons").style.display = "none";
    document.getElementById("store-buttons").style.display = "none";
    document.getElementById("deadline-buttons").style.display = "flex";
    uiMode = "deadline";
}

function openStore() {
    sendCommand("store");
    showStoreButtons();
}

function storeChoice(option) {
    sendCommand(option);
    showNormalButtons();
}

function openCharm() {
    sendCommand("charm");
}

function deadlineChoice(option) {
    sendCommand(option);
    showNormalButtons();
}
</script>

</body>
