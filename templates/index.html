<!DOCTYPE html>
<html>
<head>
    <title>Slot Machine Game</title>
    <style>
        body {
            font-family: monospace;
            background-color: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
        }

        #terminal {
            background-color: #000;
            border: 2px solid #0f0;
            padding: 15px;
            height: 600px;
            overflow-y: auto;
            margin-bottom: 20px;
            white-space: pre;
            font-family: monospace;
        }

        .button-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .button-row button {
            padding: 12px 25px;
            background-color: #0f0;
            color: #000;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-family: monospace;
            font-size: 16px;
            border-radius: 4px;
        }

        .button-row button:hover {
            background-color: #0a0;
        }

        .symbol-container {
            display: inline-block;
            position: relative;
            width: 48px;
            height: 48px;
            margin: 2px 6px;
            vertical-align: middle;
        }

        .symbol-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .multiplier-overlay {
            position: absolute;
            bottom: -2px;
            right: -2px;
            background: rgba(0, 0, 0, 0.75);
            color: #0f0;
            font-size: 14px;
            padding: 1px 4px;
            border-radius: 3px;
            font-weight: bold;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <h1>🎰 Slot Machine Game</h1>

    <div id="terminal"></div>

    <!-- NORMAL GAMEPLAY BUTTONS -->
    <div id="normal-buttons" class="button-row">
        <button onclick="spinMax()">Spin Max</button>
        <button onclick="spinHalf()">Spin ½ Max</button>
        <button onclick="openStore()">Store</button>
        <button onclick="openCharm()">Charm</button>
        <button onclick="sendCommand('q')">Quit</button>
    </div>

    <!-- STORE MODE BUTTONS -->
    <div id="store-buttons" class="button-row" style="display:none;">
        <button onclick="storeChoice('1')">1</button>
        <button onclick="storeChoice('2')">2</button>
        <button onclick="storeChoice('3')">3</button>
        <button onclick="storeChoice('4')">4</button>
        <button onclick="storeChoice('leave')">Leave</button>
    </div>

    <!-- CHARM MODE BUTTONS -->
    <div id="charm-buttons" class="button-row" style="display:none;">
        <button onclick="charmChoice('1')">1</button>
        <button onclick="charmChoice('2')">2</button>
        <button onclick="charmChoice('3')">3</button>
        <button onclick="charmChoice('leave')">Leave</button>
    </div>

    <script>
        const terminal = document.getElementById('terminal');
        let uiMode = "normal";

        // Start game
        fetch('/api/start-game', { method: 'POST' });

        // Poll output
        setInterval(async () => {
            const res = await fetch('/api/get-output');
            const data = await res.json();
            if (data.output) {
                terminal.innerHTML += data.output;
                terminal.scrollTop = terminal.scrollHeight;
            }
        }, 200);

        function sendCommand(cmd) {
            fetch('/api/send-input', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ input: cmd })
            });
        }

        // Money extraction
        function extractMoney() {
            const text = terminal.innerText;
            const matches = [...text.matchAll(/You have \$(\d+)/g)];
            if (matches.length === 0) return 0;
            return parseInt(matches[matches.length - 1][1], 10);
        }

        function spinMax() {
            const money = extractMoney();
            const maxSpins = Math.min(money, 8);
            if (maxSpins > 0) sendCommand(String(maxSpins));
        }

        function spinHalf() {
            const money = extractMoney();
            const maxSpins = Math.min(money, 8);
            const half = Math.floor(maxSpins / 2);
            if (half > 0) sendCommand(String(half));
        }

        // UI MODE SWITCHING
        function showNormalButtons() {
            document.getElementById("normal-buttons").style.display = "flex";
            document.getElementById("store-buttons").style.display = "none";
            document.getElementById("charm-buttons").style.display = "none";
            uiMode = "normal";
        }

        function showStoreButtons() {
            document.getElementById("normal-buttons").style.display = "none";
            document.getElementById("store-buttons").style.display = "flex";
            document.getElementById("charm-buttons").style.display = "none";
            uiMode = "store";
        }

        function showCharmButtons() {
            document.getElementById("normal-buttons").style.display = "none";
            document.getElementById("store-buttons").style.display = "none";
            document.getElementById("charm-buttons").style.display = "flex";
            uiMode = "charm";
        }

        // STORE MODE
        function openStore() {
            sendCommand("store");
            showStoreButtons();
        }

        function storeChoice(option) {
            sendCommand(option);
            showNormalButtons();
        }

        // CHARM MODE
        function openCharm() {
            sendCommand("charm");
            showCharmButtons();
        }

        function charmChoice(option) {
            sendCommand(option);
            showNormalButtons();
        }
    </script>

</body>
</html>
