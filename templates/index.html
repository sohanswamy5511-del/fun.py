<!DOCTYPE html>
<html>
<head>
    <title>Slot Machine Game</title>
    <style>
        body {
            font-family: monospace;
            background-color: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
        }

        /* Terminal output area */
        #terminal {
            background-color: #000;
            border: 2px solid #0f0;
            padding: 15px;
            height: 600px;
            overflow-y: auto;
            margin-bottom: 20px;

            /* CRITICAL FIX: preserve newlines EXACTLY */
            white-space: pre;
            font-family: monospace;

            /* Helps align rows of symbols */
            line-height: 52px;
        }

        /* Button bar */
        .button-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .button-row button {
            padding: 12px 25px;
            background-color: #0f0;
            color: #000;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-family: monospace;
            font-size: 16px;
            border-radius: 4px;
        }

        .button-row button:hover {
            background-color: #0a0;
        }

        /* Symbol container — behaves like a single tile */
        .symbol-container {
            display: inline-block;
            position: relative;
            width: 48px;
            height: 48px;
            margin: 2px 6px;
            vertical-align: middle;
        }

        /* Symbol image */
        .symbol-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        /* Multiplier overlay */
        .multiplier-overlay {
            position: absolute;
            bottom: -2px;
            right: -2px;
            background: rgba(0, 0, 0, 0.75);
            color: #0f0;
            font-size: 14px;
            padding: 1px 4px;
            border-radius: 3px;
            font-weight: bold;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <h1>🎰 Slot Machine Game</h1>

    <div id="terminal"></div>

    <!-- BUTTON CONTROLS -->
    <div class="button-row">
        <button onclick="sendCommand('1')">Spin 1</button>
        <button onclick="sendCommand('5')">Spin 5</button>
        <button onclick="sendCommand('store')">Store</button>
        <button onclick="sendCommand('charm')">Charm</button>
        <button onclick="sendCommand('q')">Quit</button>
    </div>

    <script>
        const terminal = document.getElementById('terminal');

        // Start the game automatically
        fetch('/api/start-game', { method: 'POST' });

        // Poll for output every 200ms
        setInterval(async () => {
            const res = await fetch('/api/get-output');
            const data = await res.json();
            if (data.output) {
                terminal.innerHTML += data.output;
                terminal.scrollTop = terminal.scrollHeight;
            }
        }, 200);

        // Send a command to the server
        function sendCommand(cmd) {
            fetch('/api/send-input', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ input: cmd })
            });
        }
    </script>

</body>
</html>
